<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width: 150px; height: 100vh;">
        <h4>Menu</h4>
        <a href="/dashboard" class="text-white d-block mb-2">Home</a>
        <a href="/logout" class="text-white d-block">Logout</a>
    </div>

    <!-- Content -->
    <div class="p-4 flex-grow-1">
        <h2>Welcome {{ user }}</h2>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Users</h5>
                    <p>{{ users_count }}</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Sales</h5>
                    <p>0</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Visits</h5>
                    <p>0</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
